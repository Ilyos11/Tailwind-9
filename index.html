<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind 9</title>
  <link rel="stylesheet" href="./src/output.css">
</head>
<body>
  
  <!-- Header -->
  <nav class="hidden md:flex items-center justify-end gap-8 p-6 bg-white font-sans">
  
  <div class="flex items-center gap-6">
    <a href="#" class="text-gray-700 hover:text-green-600 transition-colors text-sm font-medium">Booking</a>
    <a href="#" class="text-gray-700 hover:text-green-600 transition-colors text-sm font-medium">Facilities</a>
    <a href="#" class="text-gray-700 hover:text-green-600 transition-colors text-sm font-medium">About Us</a>
    <a href="#" class="text-gray-700 hover:text-green-600 transition-colors text-sm font-medium">Location</a>
    <a href="#" class="text-gray-700 hover:text-green-600 transition-colors text-sm font-medium">Contact</a>
  </div>

  
  <button class="bg-[#1EB073] hover:bg-[#189a64] text-white px-6 py-2 rounded-full text-sm font-medium transition-colors shadow-sm">
    Login
  </button>
</nav>



  <!-- Section 2-->
  <section class="max-w-6xl w-full bg-white rounded-[40px] overflow-hidden shadow-xl flex flex-col md:flex-row">
    
    
    <div class="flex-1 p-8 md:p-16 lg:p-20 flex flex-col justify-center relative z-10 bg-white">
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold text-gray-900 leading-tight">
        Find your perfect <br> place to stay
      </h1>
      <p class="mt-6 text-gray-500 text-sm md:text-base max-w-md leading-relaxed">
        Lorem Ipsum is simply dummy text of the printing and typesetting industry.
      </p>

      
      <div class="mt-10 flex items-center gap-4 cursor-pointer group w-fit">
        <div class="w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-lg border border-gray-100 group-hover:scale-110 transition-transform">
       
          <img src="play-icon.svg" alt="Play" class="w-4 h-4 ml-1">
        </div>
        <span class="font-semibold text-gray-800">Watch video</span>
      </div>

      
      <div class="mt-12 md:mt-16 md:absolute md:bottom-12 md:left-20 md:right-[-150px] z-20">
        <div class="bg-white rounded-2xl md:rounded-full shadow-2xl p-2 md:p-3 flex flex-col md:flex-row items-center gap-4 md:gap-0 border border-gray-100">
          
       
          <div class="flex items-center gap-3 px-6 py-2 border-b md:border-b-0 md:border-r border-gray-100 w-full md:w-auto">
            <img src="./images/Location icon.png" alt="" class="w-5 h-5">
            <div>
              <p class="text-[13px] font-bold text-gray-800 leading-none">Location</p>
              <p class="text-[11px] text-gray-400 mt-1">United States</p>
            </div>
          </div>

         
          <div class="flex items-center gap-3 px-6 py-2 border-b md:border-b-0 md:border-r border-gray-100 w-full md:w-auto">
            <img src="./images/Calendar icon.png" alt="" class="w-5 h-5">
            <div>
              <p class="text-[13px] font-bold text-gray-800 leading-none">Check in</p>
              <p class="text-[11px] text-gray-400 mt-1">10 Jun 2021</p>
            </div>
          </div>

         
          <div class="flex items-center gap-3 px-6 py-2 border-b md:border-b-0 md:border-r border-gray-100 w-full md:w-auto">
            <img src="./images/Calendar icon.png" alt="" class="w-5 h-5">
            <div>
              <p class="text-[13px] font-bold text-gray-800 leading-none">Check out</p>
              <p class="text-[11px] text-gray-400 mt-1">15 Jun 2021</p>
            </div>
          </div>

        
          <div class="flex items-center gap-3 px-6 py-2 w-full md:w-auto">
            <img src="./images/Person icon.png" alt="" class="w-5 h-5">
            <div>
              <p class="text-[13px] font-bold text-gray-800 leading-none">Rooms for</p>
              <p class="text-[11px] text-gray-400 mt-1">1 room, 2 guests</p>
            </div>
          </div>

          
          <button class="bg-[#1EB073] hover:bg-[#189a64] text-white px-8 py-4 rounded-xl md:rounded-full flex items-center gap-2 transition-all w-full md:w-auto justify-center md:ml-auto">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <span class="font-medium">Search...</span>
          </button>
        </div>
      </div>
    </div>

    <div class="flex-1 min-h-[300px] md:min-h-full relative">
      <img src="./images/House photo.png" alt="House" class="absolute inset-0 w-full h-full object-cover">
    </div>

  </section>

</body>
</html>
