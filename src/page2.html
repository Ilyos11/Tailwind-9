<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind 9</title>
  <link rel="stylesheet" href="./output.css">
</head>
<body>

  <!-- Header -->
  <nav class="bg-white font-sans py-4">
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between relative">
    
   
    <div class="flex-shrink-0">
    </div>

    
    <input type="checkbox" id="nav-toggle" class="hidden peer">

    
    <label for="nav-toggle" class="md:hidden cursor-pointer p-2 text-gray-600 order-3">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
      </svg>
    </label>

    <div class="hidden peer-checked:flex flex-col md:flex md:flex-row items-center absolute md:static top-full left-0 w-full md:w-auto bg-white md:bg-transparent shadow-lg md:shadow-none z-50 md:gap-10 p-6 md:p-0">
      
  
      <div class="flex flex-col md:flex-row items-center gap-6 md:gap-8 mb-6 md:mb-0">
        <a href="#" class="text-[#4A4A4A] hover:text-[#1EB073] text-[15px] font-medium transition-colors">Booking</a>
        <a href="#" class="text-[#4A4A4A] hover:text-[#1EB073] text-[15px] font-medium transition-colors">Facilities</a>
        <a href="#" class="text-[#4A4A4A] hover:text-[#1EB073] text-[15px] font-medium transition-colors">About Us</a>
        <a href="#" class="text-[#4A4A4A] hover:text-[#1EB073] text-[15px] font-medium transition-colors">Location</a>
        <a href="#" class="text-[#4A4A4A] hover:text-[#1EB073] text-[15px] font-medium transition-colors">Contact</a>
      </div>

     
      <button class="bg-[#1EB073] hover:bg-[#189a64] text-white px-9 py-2.5 rounded-full text-[15px] font-medium transition-all shadow-md active:scale-95">
        Login
      </button>
    </div>

  </div>
</nav>

  
</body>
</html>
